<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0c0e14" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/png" href="/juice-logo-dark.png" />
    <title>JUICE</title>
    <script>
      (function () {
        var t = localStorage.getItem("stockradar-theme");
        var mode =
          t === "light" || t === "dark"
            ? t
            : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        document.documentElement.classList.add(mode);
        document.documentElement.style.colorScheme = mode;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", mode === "light" ? "#f8f9ff" : "#0c0e14");
        var favicon = document.querySelector('link[rel="icon"]');
        if (favicon) favicon.setAttribute("href", mode === "light" ? "/juice-logo.png" : "/juice-logo-dark.png");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
