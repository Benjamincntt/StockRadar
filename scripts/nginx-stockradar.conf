# /etc/nginx/sites-available/stockradar
# Subdomain riêng — không đụng PhuKienTuiLoc (port 5280).
# Thay YOUR_DOMAIN bằng stock.baobiantea.com hoặc IP LAN khi test.

server {
    listen 80;
    server_name YOUR_DOMAIN 103.226.248.6;

    client_max_body_size 10M;

    root /var/www/publish/stockradar;
    index index.html;

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:5281/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # SignalR WebSocket
    location /hubs/ {
        proxy_pass http://127.0.0.1:5281/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Static assets — không fallback index.html
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|txt|xml|json|js|css|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
