# Tự deploy lên server Gdata khi push master (chỉ khi đổi frontend/backend).
# Cấu hình secrets: docs/DEPLOY-GDATA.md — mục "Auto deploy (GitHub Actions)".
name: Deploy production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      action:
        description: Deploy target
        required: true
        default: all
        type: choice
        options:
          - all
          - fe
          - be

concurrency:
  group: stockradar-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            deploy:
              - 'deploy.sh'
              - '.github/workflows/deploy.yml'

      - name: Resolve deploy target
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          fe="${{ steps.filter.outputs.frontend }}"
          be="${{ steps.filter.outputs.backend }}"
          dep="${{ steps.filter.outputs.deploy }}"
          if [ "$fe" = "true" ] && [ "$be" = "true" ]; then
            echo "target=all" >> "$GITHUB_OUTPUT"
          elif [ "$be" = "true" ] || [ "$dep" = "true" ]; then
            echo "target=be" >> "$GITHUB_OUTPUT"
          elif [ "$fe" = "true" ]; then
            echo "target=fe" >> "$GITHUB_OUTPUT"
          else
            echo "target=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no FE/BE changes)
        if: steps.action.outputs.target == 'skip'
        run: echo "Chỉ đổi mobile/docs/scripts — bỏ qua deploy server."

      - name: Deploy via SSH
        if: steps.action.outputs.target != 'skip'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/StockRadar
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            bash deploy.sh ${{ steps.action.outputs.target }}
