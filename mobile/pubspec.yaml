name: juice_app
description: JUICE — Smart Money Monitor (Flutter mobile client)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.3
  go_router: ^14.6.2
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  signalr_netcore: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/juice-launcher-icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/juice-launcher-icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/juice-logo.png
    - assets/juice-logo-dark.png
